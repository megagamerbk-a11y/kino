<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kino</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand-row">
        <div>
          <h1 class="brand">Kino</h1>
          <div class="brand-sub">Ваши ссылки, библиотека и плеер</div>
        </div>
      </div>

      <div class="panel search-panel">
        <input id="searchInput" class="input" type="text" placeholder="Поиск по названию, типу, категории" />
      </div>

      <div class="panel add-panel">
        <div class="panel-title">Добавить ссылку</div>
        <input id="titleInput" class="input" type="text" placeholder="Название" />
        <input id="urlInput" class="input" type="text" placeholder="Прямая ссылка на файл/поток" />
        <div class="row two-col">
          <select id="typeInput" class="input">
            <option value="mp4">mp4</option>
            <option value="webm">webm</option>
            <option value="hls">m3u8 / hls</option>
            <option value="ogv">ogv test</option>
          </select>
          <input id="categoryInput" class="input" type="text" placeholder="Категория" />
        </div>
        <textarea id="descriptionInput" class="input textarea" placeholder="Описание (необязательно)"></textarea>
        <div class="row">
          <button id="addBtn" class="btn primary">Сохранить</button>
          <button id="clearFormBtn" class="btn">Очистить</button>
        </div>
      </div>

      <div class="panel presets-panel">
        <div class="panel-title">Быстрые тесты</div>
        <div class="preset-list">
          <button class="btn preset-btn" data-title="Demo MP4" data-type="mp4" data-category="demo" data-url="https://www.w3schools.com/html/mov_bbb.mp4">Тест MP4</button>
          <button class="btn preset-btn" data-title="Demo WebM" data-type="webm" data-category="demo" data-url="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.webm">Тест WebM</button>
          <button class="btn preset-btn" data-title="Demo HLS" data-type="hls" data-category="stream" data-url="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8">Тест HLS</button>
        </div>
      </div>

      <div class="panel library-panel">
        <div class="panel-title panel-title-row">
          <span>Библиотека</span>
          <div class="mini-actions">
            <button id="showAllBtn" class="mini-btn active">Все</button>
            <button id="showFavBtn" class="mini-btn">★</button>
          </div>
        </div>
        <div id="libraryList" class="library-list"></div>
      </div>
    </aside>

    <main class="content">
      <section class="player-card">
        <div class="player-head">
          <div>
            <div id="currentTitle" class="player-title">Выберите ссылку</div>
            <div id="currentMeta" class="player-meta">Тип: —</div>
          </div>
          <div class="player-modes">
            <button id="modeNativeBtn" class="mode-btn active">Native</button>
            <button id="modeOgvBtn" class="mode-btn">OGV test</button>
            <button id="modeDeviceBtn" class="mode-btn">Device mode</button>
          </div>
        </div>

        <div id="playerStage" class="player-stage">
          <div id="playerHost" class="player-host"></div>
          <div id="overlayMessage" class="overlay-message">Ничего не выбрано</div>
        </div>

        <div class="controls">
          <button id="playPauseBtn" class="btn icon-btn">▶</button>
          <button id="muteBtn" class="btn icon-btn">🔊</button>
          <div id="timeCurrent" class="time-label">00:00</div>
          <input id="seekBar" class="seek" type="range" min="0" max="100" value="0" />
          <div id="timeRemaining" class="time-label">-00:00</div>
          <button id="fullscreenBtn" class="btn icon-btn">⛶</button>
        </div>

        <div class="proxy-row">
          <div><strong>Источник:</strong> <span id="sourceText">—</span></div>
          <div><strong>Proxy:</strong> <span id="proxyText">—</span></div>
        </div>
      </section>

      <section class="info-grid">
        <div class="panel info-card">
          <div class="panel-title">Описание</div>
          <div id="currentDescription" class="info-text">Описание появится здесь.</div>
        </div>

        <div class="panel info-card">
          <div class="panel-title">Статус</div>
          <div id="statusText" class="info-text">Готово к работе.</div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://unpkg.com/ogv@1.8.9/dist/ogv.js"></script>
  <script src="/app.js"></script>
</body>
</html>
